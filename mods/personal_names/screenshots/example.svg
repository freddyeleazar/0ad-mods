<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="800" height="600" fill="#2d3436"/>
  
  <!-- Patrón de fondo -->
  <defs>
    <pattern id="pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#636e72"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#pattern)"/>
  
  <!-- Escudo romano -->
  <ellipse cx="400" cy="300" rx="150" ry="180" fill="#8B4513" stroke="#ffd700" stroke-width="8"/>
  <ellipse cx="400" cy="300" rx="120" ry="150" fill="#A0522D"/>
  
  <!-- Letra "N" central -->
  <text x="400" y="320" font-family="serif" font-size="120" fill="#ffd700" text-anchor="middle" font-weight="bold">N</text>
  
  <!-- Nombres alrededor -->
  <text x="200" y="150" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Marcus</text>
  <text x="300" y="120" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Julia</text>
  <text x="500" y="120" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Lucius</text>
  <text x="600" y="150" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Aurelia</text>
  
  <text x="150" y="300" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Gaius</text>
  <text x="650" y="300" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Claudia</text>
  
  <text x="200" y="450" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Titus</text>
  <text x="300" y="480" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Cornelia</text>
  <text x="500" y="480" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Septimus</text>
  <text x="600" y="450" font-family="serif" font-size="24" fill="#ffffff" text-anchor="middle">Flavia</text>
  
  <!-- Texto -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="48" fill="#ffd700" text-anchor="middle" font-weight="bold">Personal Names</text>
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">Mod para 0 A.D.</text>
  
  <!-- Decoraciones -->
  <polygon points="100,200 110,210 120,200 110,190" fill="#ffd700"/>
  <polygon points="700,200 710,210 720,200 710,190" fill="#ffd700"/>
  <polygon points="100,400 110,410 120,400 110,390" fill="#ffd700"/>
  <polygon points="700,400 710,410 720,400 710,390" fill="#ffd700"/>
</svg>